[alembic]
script_location = alembic
#sqlalchemy.url = postgresql://postgres:Admin123@localhost:5432/uattest
sqlalchemy.url = postgresql://postgres:Admin123@localhost:5432/sishub
#sqlalchemy.url=postgresql://root:s!SRoOtAdmin2025@13.234.23.51:5432/sishub

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
